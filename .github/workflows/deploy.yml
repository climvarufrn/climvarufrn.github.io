name: Deploy Vite site to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app   # 🔥 AQUI ESTÁ A CHAVE

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Debug structure 🔍
        run: |
          echo "PWD:"
          pwd
          echo "Arquivos:"
          ls -R

      - name: Build
        run: npm run build

      - name: Debug dist 🔍
        run: |
          echo "Conteúdo do dist:"
          ls -R dist

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist   # 🔥 IMPORTANTE

      - name: Deploy
        uses: actions/deploy-pages@v4
